<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мероприятия — EventFinder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">EventFinder</a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="events.html" class="active">Мероприятия</a></li>
                <li id="nav-create" style="display:none;"><a href="create-event.html">Создать</a></li>
                <li id="nav-ranking" style="display:none;"><a href="ranking.html">Ранжирование</a></li>
                <li id="nav-favorites" style="display:none;"><a href="favorites.html">Избранное</a></li>
                <li id="nav-profile" style="display:none;"><a href="profile.html">Профиль</a></li>
                <li id="nav-login"><a href="login.html">Войти</a></li>
                <li id="nav-logout" style="display:none;"><a href="#" onclick="logout()">Выйти</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1>Афиша мероприятий</h1>

        <!-- Фильтры -->
        <section class="filters">
            <div class="filter-group">
                <label for="filter-category">Категория:</label>
                <select id="filter-category">
                    <option value="">Все категории</option>
                    <option value="concert">Концерты</option>
                    <option value="theater">Театр</option>
                    <option value="exhibition">Выставки</option>
                    <option value="conference">Конференции</option>
                    <option value="sport">Спорт</option>
                    <option value="education">Образование</option>
                    <option value="entertainment">Развлечения</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-search">Поиск:</label>
                <input type="text" id="filter-search" placeholder="Название, место или описание">
            </div>
            <div class="filter-group">
                <label for="filter-start-date">Дата от:</label>
                <input type="date" id="filter-start-date">
            </div>
            <div class="filter-group">
                <label for="filter-end-date">Дата до:</label>
                <input type="date" id="filter-end-date">
            </div>
            <button class="btn btn-secondary" onclick="applyFilters()">Применить</button>
            <button class="btn btn-text" onclick="resetFilters()">Сбросить</button>
        </section>

        <!-- Список мероприятий -->
        <div id="events-list" class="events-grid"></div>
        <div id="events-loading" class="loading">Загрузка мероприятий...</div>
        <div id="events-empty" class="empty-state" style="display:none;">
            <p>Мероприятия не найдены</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 EventFinder</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
