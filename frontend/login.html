<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — EventFinder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">EventFinder</a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="login.html">Войти</a></li>
                <li><a href="register.html">Регистрация</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="auth-form">
            <h1>Вход в аккаунт</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required placeholder="Минимум 6 символов">
                </div>
                <div id="error-message" class="error-message"></div>
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>
            <p class="auth-link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
