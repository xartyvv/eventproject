<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать мероприятие — EventFinder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">EventFinder</a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="events.html">Мероприятия</a></li>
                <li><a href="create-event.html" class="active">Создать</a></li>
                <li><a href="ranking.html">Ранжирование</a></li>
                <li><a href="favorites.html">Избранное</a></li>
                <li><a href="profile.html">Профиль</a></li>
                <li><a href="#" onclick="logout()">Выйти</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1>Создать мероприятие</h1>
        <form id="create-event-form" class="event-form">
            <fieldset>
                <legend>Основная информация</legend>
                <div class="form-group">
                    <label for="title">Название *</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Описание *</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Дата и время *</label>
                        <input type="datetime-local" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Место *</label>
                        <input type="text" id="location" name="location" required placeholder="Адрес или название">
                    </div>
                </div>
                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category" name="category">
                        <option value="concert">Концерты</option>
                        <option value="theater">Театр</option>
                        <option value="exhibition">Выставки</option>
                        <option value="conference">Конференции</option>
                        <option value="sport">Спорт</option>
                        <option value="education">Образование</option>
                        <option value="entertainment">Развлечения</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Критерии для МАИ (15 критериев)</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="cost">Стоимость билета (руб.)</label>
                        <input type="number" id="cost" name="cost" value="0" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="distance">Удалённость (км)</label>
                        <input type="number" id="distance" name="distance" value="0" min="0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="duration">Длительность (часы)</label>
                        <input type="number" id="duration" name="duration" value="2" min="0" step="0.5">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="rating">Рейтинг мероприятия (0-10)</label>
                        <input type="number" id="rating" name="rating" value="5" min="0" max="10" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="capacity">Вместимость (чел.)</label>
                        <input type="number" id="capacity" name="capacity" value="100" min="0">
                    </div>
                    <div class="form-group">
                        <label for="organizer_rating">Рейтинг организатора (0-10)</label>
                        <input type="number" id="organizer_rating" name="organizer_rating" value="5" min="0" max="10" step="0.1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="age_restriction">Возрастное ограничение (0=без ограничений)</label>
                        <input type="number" id="age_restriction" name="age_restriction" value="0" min="0" max="18">
                    </div>
                    <div class="form-group">
                        <label for="time_of_day">Время (1=утро, 2=день, 3=вечер, 4=ночь)</label>
                        <select id="time_of_day" name="time_of_day">
                            <option value="1">Утро</option>
                            <option value="2">День</option>
                            <option value="3" selected>Вечер</option>
                            <option value="4">Ночь</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="popularity">Популярность (кол-во участников)</label>
                        <input type="number" id="popularity" name="popularity" value="0" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="accessibility">Доступность (0-10)</label>
                        <input type="number" id="accessibility" name="accessibility" value="5" min="0" max="10" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="interactivity">Интерактивность (0-10)</label>
                        <input type="number" id="interactivity" name="interactivity" value="5" min="0" max="10" step="0.1">
                    </div>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="is_weekend" name="is_weekend">
                        Проходит в выходные
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="is_online" name="is_online">
                        Онлайн формат
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="is_free" name="is_free">
                        Бесплатное участие
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="requires_registration" name="requires_registration">
                        Требуется регистрация
                    </label>
                </div>
            </fieldset>

            <div id="form-error" class="error-message"></div>
            <div id="form-success" class="success-message"></div>
            <button type="submit" class="btn btn-primary btn-block">Создать мероприятие</button>
        </form>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
