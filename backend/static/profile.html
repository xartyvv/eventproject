<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — EventFinder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">EventFinder</a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="events.html">Мероприятия</a></li>
                <li><a href="create-event.html">Создать</a></li>
                <li><a href="ranking.html">Ранжирование</a></li>
                <li><a href="favorites.html">Избранное</a></li>
                <li><a href="profile.html" class="active">Профиль</a></li>
                <li><a href="#" onclick="logout()">Выйти</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1>Личный кабинет</h1>
        <div id="profile-info" class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">П</div>
                <div>
                    <h2 id="profile-username">Загрузка...</h2>
                    <p id="profile-email"></p>
                </div>
            </div>
            <div class="profile-stats">
                <div class="stat">
                    <span class="stat-number" id="stat-events">0</span>
                    <span class="stat-label">Мероприятий создано</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="stat-favorites">0</span>
                    <span class="stat-label">В избранном</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="stat-ranking">Нет</span>
                    <span class="stat-label">Профиль МАИ</span>
                </div>
            </div>
        </div>

        <section class="profile-section">
            <h2>Мои мероприятия</h2>
            <div id="my-events" class="events-grid"></div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/events.js"></script>
    <script src="js/profile.js?v=2"></script>
</body>
</html>
